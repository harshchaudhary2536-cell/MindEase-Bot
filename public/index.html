<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase Neon AI ⚡</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#020617;
  border-right:1px solid #00f2ff33;
  padding:10px;
  overflow:auto;
}

.chat-item{
  padding:8px;
  margin:5px 0;
  background:#111;
  border-radius:6px;
  cursor:pointer;
}

.chat-item:hover{
  box-shadow:0 0 10px #00f2ff;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.user{
  background:#334155;
  align-self:flex-end;
}

.bot{
  background:#020617;
  border:1px solid #00f2ff55;
  box-shadow:0 0 10px #00f2ff33;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  gap:5px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 10px #00f2ff;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="history"></div>
</div>

<div class="main">

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Talk to me..." />
  <button onclick="startVoice()">🎤</button>
  <button onclick="send()">➤</button>
</div>

</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || [];
let currentChat = null;
let recognition;

// HISTORY
function loadHistory(){
  const history=document.getElementById("history");
  history.innerHTML="";

  chats.forEach((chat,index)=>{
    const div=document.createElement("div");
    div.className="chat-item";
    div.innerText=chat.title||"Chat "+(index+1);
    div.onclick=()=>loadChat(index);
    history.appendChild(div);
  });
}

// NEW CHAT
function newChat(){
  const chat={title:"New Chat",messages:[]};
  chats.push(chat);
  currentChat=chats.length-1;
  save();
  renderChat();
  loadHistory();
}

// LOAD CHAT
function loadChat(index){
  currentChat=index;
  renderChat();
}

// SAVE
function save(){
  localStorage.setItem("chats",JSON.stringify(chats));
}

// RENDER
function renderChat(){
  const chatDiv=document.getElementById("chat");
  chatDiv.innerHTML="";

  if(currentChat===null) return;

  chats[currentChat].messages.forEach(m=>{
    addMsg(m.parts[0].text,m.role==="user"?"user":"bot");
  });
}

// ADD MESSAGE
function addMsg(text,type){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  if(type==="bot") speak(text);
}

// SPEAK
function speak(text){
  const speech=new SpeechSynthesisUtterance(text);
  speech.lang="en-IN";
  window.speechSynthesis.speak(speech);
}

// VOICE INPUT
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang="en-IN";

  recognition.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
    send();
  };

  recognition.start();
}

// SEND
async function send(){
  const input=document.getElementById("input");
  if(!input.value.trim()) return;

  const msg=input.value;
  addMsg(msg,"user");

  chats[currentChat].messages.push({
    role:"user",
    parts:[{text:msg}]
  });

  input.value="";
  save();

  const res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:chats[currentChat].messages})
  });

  const data=await res.json();

  addMsg(data.reply,"bot");

  chats[currentChat].messages.push({
    role:"model",
    parts:[{text:data.reply}]
  });

  save();
}

// INIT
newChat();
loadHistory();
</script>

</body>
</html>
