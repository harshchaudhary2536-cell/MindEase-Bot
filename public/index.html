<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase AI ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Inter';
  color:white;
  height:100vh;
  display:flex;
  background:#020617;
}

/* MENU */
#menuBtn{
  display:none;
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00f2ff;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:rgba(0,0,0,0.6);
  padding:15px;
}

.sidebar h2{
  font-family:'Orbitron';
  color:#00f2ff;
}

.sidebar button{
  width:100%;
  margin:5px 0;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CHAT */
#chat{
  flex:1;
  width:100%;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.user{
  align-self:flex-end;
  background:#334155;
}

.bot{
  align-self:flex-start;
  border:1px solid #00f2ff55;
}

/* INPUT */
.input-area{
  display:flex;
  width:100%;
  padding:10px;
  gap:5px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  #menuBtn{display:block;}

  .sidebar{
    position:fixed;
    left:-250px;
    top:0;
    height:100%;
    transition:0.3s;
  }

  .sidebar.active{left:0;}
}
</style>
</head>

<body>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div class="sidebar">
  <h2>MindEase ⚡</h2>

  <button onclick="setMode('chill')">😌 Chill</button>
  <button onclick="setMode('funny')">😂 Funny</button>
  <button onclick="setMode('savage')">😈 Savage</button>

  <button onclick="toggleCall()">📞 Call Mode</button>

  <button onclick="toggleLang()">🌐 UI Language</button>

  <button onclick="setVoice('female')">👩 Female Voice</button>
  <button onclick="setVoice('male')">👨 Male Voice</button>

  <button onclick="setTone('calm')">😌 Calm Tone</button>
  <button onclick="setTone('fast')">⚡ Energetic</button>
</div>

<div class="main">

<div id="chat">
  <div class="msg bot">Kya scene hai bro 😎</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Type or speak..." />
  <button onclick="startVoice()">🎤</button>
  <button onclick="stopAll()">⏹️</button>
  <button onclick="send()">➤</button>
</div>

</div>

<script>
let messages=[];
let mode="chill";
let recognition;
let isListening=false;
let callMode=false;
let currentLang="en";

let voiceType="female";
let tone="calm";

// MENU
function toggleMenu(){
  document.querySelector(".sidebar").classList.toggle("active");
}

// MODE
function setMode(m){mode=m;}

// UI LANGUAGE
function toggleLang(){
  currentLang = currentLang==="en" ? "hi" : "en";
  document.getElementById("input").placeholder =
    currentLang==="hi" ? "Yahan likho ya bolo..." : "Type or speak...";
}

// VOICE SETTINGS
function setVoice(v){ voiceType=v; }
function setTone(t){ tone=t; }

// 📞 CALL MODE
function toggleCall(){
  callMode=!callMode;
  alert(callMode ? "Call Mode ON 📞" : "Call Mode OFF");

  if(callMode) startVoice();
}

// 🧠 DETECT LANGUAGE
function detectLang(text){
  const hindi=/[\u0900-\u097F]/;
  return hindi.test(text) ? "hi-IN" : "en-IN";
}

// 🎭 EMOTION DETECT
function detectEmotion(text){
  text=text.toLowerCase();

  if(text.includes("sad")||text.includes("low")||text.includes("cry")) return "sad";
  if(text.includes("angry")||text.includes("mad")) return "angry";
  if(text.includes("happy")||text.includes("great")) return "happy";

  return "normal";
}

// 🔊 SPEAK (ULTIMATE)
function speak(text){
  window.speechSynthesis.cancel();

  const speech=new SpeechSynthesisUtterance(text);

  // 🌐 language auto
  speech.lang=detectLang(text);

  // 🎭 emotion
  const emotion=detectEmotion(text);

  if(tone==="calm"){
    speech.rate=0.9;
  } else {
    speech.rate=1.2;
  }

  if(emotion==="sad") speech.rate=0.8;
  if(emotion==="happy") speech.rate=1.2;

  // 👩‍🦰 voice selection
  const voices=window.speechSynthesis.getVoices();

  if(voiceType==="female"){
    speech.voice = voices.find(v=>v.name.toLowerCase().includes("female")) || voices[0];
  } else {
    speech.voice = voices.find(v=>v.name.toLowerCase().includes("male")) || voices[1];
  }

  speech.onend=()=>{
    if(callMode) startVoice();
  };

  window.speechSynthesis.speak(speech);
}

// 🎤 VOICE INPUT
function startVoice(){
  if(isListening) return;

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();

  recognition.lang="en-IN";
  isListening=true;

  recognition.onresult=(e)=>{
    const text=e.results[0][0].transcript;
    document.getElementById("input").value=text;
    send();
  };

  recognition.onend=()=>{isListening=false;};

  recognition.start();
}

// STOP
function stopAll(){
  callMode=false;
  window.speechSynthesis.cancel();
  if(recognition) recognition.stop();
}

// TYPE EFFECT
function typeEffect(el,text){
  let i=0;
  function typing(){
    if(i<text.length){
      el.innerText=text.slice(0,i+1);
      i++;
      setTimeout(typing,18);
    }
  }
  typing();
}

// ADD MSG
function addMsg(text,type){
  const chat=document.getElementById("chat");

  const div=document.createElement("div");
  div.className="msg "+type;
  chat.appendChild(div);

  chat.scrollTop=chat.scrollHeight;

  if(type==="bot"){
    typeEffect(div,text);
    setTimeout(()=>speak(text),100);
  } else {
    div.innerText=text;
  }
}

// SEND
async function send(){
  const input=document.getElementById("input");
  if(!input.value.trim()) return;

  const msg=input.value;
  addMsg(msg,"user");

  messages.push({role:"user",parts:[{text:msg}]});
  input.value="";

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages,mode})
    });

    const data=await res.json();

    addMsg(data.reply,"bot");

    messages.push({role:"model",parts:[{text:data.reply}]});
  }catch{
    addMsg("Error 😭","bot");
  }
}

// ENTER
document.getElementById("input").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
