<!DOCTYPE html>
<html>
<head>
<title>MindEase</title>
<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app {
  width:420px;
  height:650px;
  background:#1e293b;
  display:flex;
  flex-direction:column;
  border-radius:20px;
}

#chat {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:5px;
  padding:10px;
  border-radius:10px;
}

.user {
  background:#334155;
  text-align:right;
}

.bot {
  background:#020617;
}

.input-area {
  display:flex;
}

input {
  flex:1;
  padding:12px;
  border:none;
  outline:none;
}

button {
  width:60px;
  border:none;
  background:#00f2ff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">
  <div id="chat">
    <div class="msg bot">Yo bro 😎 what's up?</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Type message..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    if (!res.ok) {
      addMsg("⚠️ " + data.error, "bot");
      return;
    }

    addMsg(data.reply, "bot");

    messages.push({
      role: "model",
      parts: [{ text: data.reply }]
    });

  } catch (e) {
    addMsg("❌ Server error", "bot");
  }
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
