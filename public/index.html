<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase Debug</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app {
  width:400px;
  height:600px;
  background:#1e293b;
  display:flex;
  flex-direction:column;
  border-radius:20px;
  overflow:hidden;
}

#chat {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  margin:5px;
  padding:10px;
  border-radius:10px;
}

.user {
  background:#334155;
  text-align:right;
}

.bot {
  background:#020617;
  white-space: pre-wrap; /* IMPORTANT for debug JSON */
}

.input-area {
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button {
  width:60px;
  border:none;
  background:#00f2ff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">
  <div id="chat">
    <div class="msg bot">Debug mode ON 🧠</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Type..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    // 🔥 DEBUG SHOW EVERYTHING
    if (!res.ok) {
      addMsg("⚠️ ERROR:\n" + JSON.stringify(data, null, 2), "bot");
      return;
    }

    addMsg("✅ " + data.reply, "bot");

  } catch (e) {
    addMsg("❌ FETCH ERROR: " + e.message, "bot");
  }
}

// ENTER KEY SUPPORT
document.getElementById("input").addEventListener("keypress", function(e){
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
