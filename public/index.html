<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindEase Neon ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(0,255,255,0.2);
  padding:15px;
}

.sidebar h2 {
  font-family:'Orbitron';
  color:#00f2ff;
  text-shadow:0 0 10px #00f2ff, 0 0 20px #7000ff;
}

.new-chat {
  margin-top:20px;
  padding:10px;
  border:1px solid #00f2ff;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.new-chat:hover {
  background:rgba(0,242,255,0.1);
  box-shadow:0 0 10px #00f2ff;
}

/* Main */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Chat */
#chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Messages */
.msg {
  max-width:70%;
  padding:12px 15px;
  border-radius:12px;
  animation:fade 0.3s ease;
}

.user {
  align-self:flex-end;
  background:#1e293b;
}

.bot {
  align-self:flex-start;
  background:rgba(0,242,255,0.05);
  border:1px solid rgba(0,242,255,0.3);
  box-shadow:0 0 10px rgba(0,242,255,0.2);
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* Typing */
.typing {
  font-size:12px;
  color:#00f2ff;
  text-shadow:0 0 5px #00f2ff;
}

/* Input */
.input-area {
  display:flex;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(0,255,255,0.3);
  background:#020617;
  color:white;
  outline:none;
}

input:focus {
  box-shadow:0 0 10px #00f2ff;
}

/* Button */
button {
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f2ff,#7000ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  box-shadow:0 0 15px #00f2ff;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>MindEase ⚡</h2>
  <div class="new-chat" onclick="clearChat()">+ New Chat</div>
</div>

<div class="main">

  <div id="chat">
    <div class="msg bot">Yo bro 😎 welcome to neon world</div>
  </div>

  <div class="input-area">
    <input id="input" placeholder="Say something..." />
    <button onclick="send()">➤</button>
  </div>

</div>

<script>
let messages = [];

function addMsg(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg bot typing";
  div.innerText = "MindEase is typing...";

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById("input");

  if (!input.value.trim()) return;

  const msg = input.value;

  addMsg(msg, "user");

  messages.push({
    role: "user",
    parts: [{ text: msg }]
  });

  input.value = "";

  showTyping();

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    removeTyping();

    if (!res.ok) {
      addMsg("⚠️ " + data.error, "bot");
      return;
    }

    addMsg(data.reply, "bot");

    messages.push({
      role: "model",
      parts: [{ text: data.reply }]
    });

  } catch {
    removeTyping();
    addMsg("❌ Server error", "bot");
  }
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
  messages = [];
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
